<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <link rel="canonical" href="https://randomly-pick.com/roulette/?lang=nl" />
  <meta http-equiv="refresh" content="0; url=/roulette/?lang=nl" />
  <script>
    try { window.localStorage.setItem('rlt-lang', 'nl'); } catch (e) {}
    window.location.replace('/roulette/?lang=nl' + window.location.hash);
  </script>
</head>
<body>
  <a href="/roulette/?lang=nl">Continue</a>
</body>
</html>
