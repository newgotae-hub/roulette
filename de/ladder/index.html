<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <link rel="canonical" href="https://randomly-pick.com/ladder/?lang=de" />
  <meta http-equiv="refresh" content="0; url=/ladder/?lang=de" />
  <script>
    try { window.localStorage.setItem('rlt-lang', 'de'); } catch (e) {}
    window.location.replace('/ladder/?lang=de' + window.location.hash);
  </script>
</head>
<body>
  <a href="/ladder/?lang=de">Continue</a>
</body>
</html>
