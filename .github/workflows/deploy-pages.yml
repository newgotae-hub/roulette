name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Predeploy smoke check (coinflip/dice)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 >/tmp/predeploy-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 1

          for path in /coinflip/ /dice/; do
            code=$(curl -s -o /tmp/predeploy-page.html -w "%{http_code}" "http://127.0.0.1:4173${path}")
            if [ "$code" != "200" ]; then
              echo "FAIL: ${path} returned HTTP ${code}"
              exit 1
            fi
            title=$(grep -o '<title>[^<]*</title>' /tmp/predeploy-page.html | head -n 1 || true)
            echo "PASS: ${path} HTTP 200 ${title}"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
