<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Coin heads thumbnail">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>
    <radialGradient id="coin" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fff7cf"/>
      <stop offset="45%" stop-color="#f3cc5c"/>
      <stop offset="78%" stop-color="#cc9530"/>
      <stop offset="100%" stop-color="#7a4a0c"/>
    </radialGradient>
    <radialGradient id="shine" cx="28%" cy="24%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(600 315)" filter="url(#shadow)">
    <circle r="222" fill="url(#coin)"/>
    <circle r="192" fill="none" stroke="#fff2bf" stroke-width="14" stroke-opacity="0.78"/>
    <circle r="208" fill="none" stroke="#8d5c13" stroke-width="6" stroke-opacity="0.48"/>
    <ellipse rx="132" ry="104" fill="url(#shine)" transform="translate(-26 -20)"/>
    <text y="28" text-anchor="middle" font-size="214" font-weight="700" font-family="Georgia, 'Times New Roman', serif" fill="#6d3d03">H</text>
  </g>

  <text x="600" y="578" text-anchor="middle" font-size="44" font-weight="700" font-family="Inter, Arial, sans-serif" fill="#0f172a">Coin Flip</text>
</svg>
