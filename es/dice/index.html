<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <link rel="canonical" href="https://randomly-pick.com/dice/?lang=es" />
  <meta http-equiv="refresh" content="0; url=/dice/?lang=es" />
  <script>
    try { window.localStorage.setItem('rlt-lang', 'es'); } catch (e) {}
    window.location.replace('/dice/?lang=es' + window.location.hash);
  </script>
</head>
<body>
  <a href="/dice/?lang=es">Continue</a>
</body>
</html>
