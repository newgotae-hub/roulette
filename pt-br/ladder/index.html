<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <link rel="canonical" href="https://randomly-pick.com/ladder/?lang=pt-br" />
  <meta http-equiv="refresh" content="0; url=/ladder/?lang=pt-br" />
  <script>
    try { window.localStorage.setItem('rlt-lang', 'pt-br'); } catch (e) {}
    window.location.replace('/ladder/?lang=pt-br' + window.location.hash);
  </script>
</head>
<body>
  <a href="/ladder/?lang=pt-br">Continue</a>
</body>
</html>
