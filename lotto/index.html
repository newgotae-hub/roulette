<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Lucky Draw</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://randomly-pick.com/luckydraw/" />
  <meta http-equiv="refresh" content="0;url=https://randomly-pick.com/luckydraw/" />
  <script>
    window.location.replace("https://randomly-pick.com/luckydraw/" + window.location.search + window.location.hash);
  </script>
</head>
<body>
  <p>Moved to <a href="https://randomly-pick.com/luckydraw/">https://randomly-pick.com/luckydraw/</a></p>
</body>
</html>
