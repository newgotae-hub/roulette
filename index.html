<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function () {
      function normalizeLang(raw) {
        var v = String(raw || '').toLowerCase().replace('_', '-');
        if (!v) return '';
        if (v === 'zh' || v.indexOf('zh-cn') === 0 || v.indexOf('zh-hans') === 0) return 'zh-cn';
        if (v.indexOf('zh-tw') === 0 || v.indexOf('zh-hk') === 0 || v.indexOf('zh-hant') === 0) return 'zh-tw';
        if (v.indexOf('pt-br') === 0) return 'pt-br';
        if (v.indexOf('ko') === 0) return 'ko';
        if (v.indexOf('en') === 0) return 'en';
        if (v.indexOf('ja') === 0) return 'ja';
        if (v.indexOf('es') === 0) return 'es';
        if (v.indexOf('fr') === 0) return 'fr';
        if (v.indexOf('de') === 0) return 'de';
        if (v.indexOf('hi') === 0) return 'hi';
        if (v.indexOf('ar') === 0) return 'ar';
        if (v.indexOf('ru') === 0) return 'ru';
        if (v.indexOf('id') === 0) return 'id';
        if (v.indexOf('tr') === 0) return 'tr';
        if (v.indexOf('it') === 0) return 'it';
        if (v.indexOf('vi') === 0) return 'vi';
        if (v.indexOf('th') === 0) return 'th';
        if (v.indexOf('nl') === 0) return 'nl';
        return v;
      }

      var supported = ['ko', 'en', 'ja', 'zh-cn', 'zh-tw', 'es', 'fr', 'de', 'pt-br', 'hi', 'ar', 'ru', 'id', 'tr', 'it', 'vi', 'th', 'nl'];
      var lang = '';

      try {
        var params = new URLSearchParams(window.location.search);
        var forced = normalizeLang(params.get('lang'));
        if (supported.indexOf(forced) !== -1) lang = forced;
      } catch (e) {}

      if (!lang) {
        try {
          var cached = normalizeLang(window.localStorage.getItem('rlt-lang'));
          if (supported.indexOf(cached) !== -1) lang = cached;
        } catch (e) {}
      }

      if (!lang) {
        var navs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || ''];
        for (var i = 0; i < navs.length; i++) {
          var cand = normalizeLang(navs[i]);
          if (supported.indexOf(cand) !== -1) {
            lang = cand;
            break;
          }
        }
      }

      if (!lang) lang = 'en';
      try { window.localStorage.setItem('rlt-lang', lang); } catch (e) {}

      var target = new URL('/roulette/', window.location.origin);
      var current = new URLSearchParams(window.location.search);

      current.forEach(function (value, key) {
        if (key !== 'lang') target.searchParams.set(key, value);
      });

      if (lang !== 'ko') target.searchParams.set('lang', lang);

      window.location.replace(target.pathname + target.search + window.location.hash);
    })();
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/roulette/" />
    <a href="/roulette/">Continue</a>
  </noscript>
</body>
</html>
